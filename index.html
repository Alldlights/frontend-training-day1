<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card | Frontend Training</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <!-- Your card goes here-->
    <div class="profile-card">
      <img class="profile-card__avatar" src="./my_avatar.jpg" alt="" />
      <h3 class="profile-card__name">Christian Ekoh</h3>
      <h4 class="profile-card__title">Frontend Developer in Training</h4>
      <p class="profile-card__bio">
        My name is Christian and I am a Frontend Developer in Training. I hope
        to learn to build scalable apps that solves real world problems
      </p>
      <div class="profile-card__socials">
        <button class="profile-card__socials--twitter-btn">Twitter</button>
        <button class="profile-card__socials--github-btn">Github</button>
      </div>

      <div class="profile-card__stats">
        <div class="profile-card__stats--items">
          <span class="profile-card__stats--lable">Projects:</span>
          <span class="profile-card__stats--value">12</span>
        </div>

        <div class="profile-card__stats--items">
          <span class="profile-card__stats--lable">Followers:</span>
          <span class="profile-card__stats--value">1.5k</span>
        </div>

        <div class="profile-card__stats--items">
          <span class="profile-card__stats--lable">Following:</span>
          <span class="profile-card__stats--value">324</span>
        </div>
      </div>
    </div>
  </body>
</html>
